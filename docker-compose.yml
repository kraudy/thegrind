services:
  db:
    image: postgres:16-alpine
    container_name: thegrind-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: inventoryuser
      POSTGRES_PASSWORD: pass
      TZ: America/Managua
      PGTZ: America/Managua        # ←extra safety for Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventoryuser -d inventorydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .                    # ← root of repo
      dockerfile: Dockerfile        # ← our new multi-stage one
    container_name: thegrind-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: inventoryuser
      SPRING_DATASOURCE_PASSWORD: pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      TZ: America/Managua
    ports:
      - "8080:8080"

volumes:
  postgres_data: