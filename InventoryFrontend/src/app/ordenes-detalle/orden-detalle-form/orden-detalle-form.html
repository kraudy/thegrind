<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="text-center mb-8">
    <h1 class="text-4xl font-bold text-gray-900">
      {{ isEdit ? 'Editar Detalle de Orden' : 'Agregar Detalle a Orden #' + formOrdenDetalle.idOrden }}
    </h1>
    <h2 class="text-2xl font-semibold text-gray-700 mt-2">{{ clienteNombre }}</h2>
  </div>

  <div class="bg-white shadow-xl rounded-xl overflow-hidden">
    <div class="p-8">
      <form (ngSubmit)="onSubmit()" #detalleForm="ngForm" class="space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- Número de línea (solo visible en edición) -->
          <div *ngIf="isEdit">
            <label for="idOrdenDetalle" class="block text-sm font-medium text-gray-700 mb-2">
              Número de Línea
            </label>
            <input id="idOrdenDetalle"
                   type="number"
                   [(ngModel)]="formOrdenDetalle.idOrdenDetalle"
                   name="idOrdenDetalle"
                   readonly
                   class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm bg-gray-50">
          </div>

          <!-- PRODUCTO -->
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Producto <span class="text-red-600">*</span>
            </label>

            <!-- Modo creación: filters + autocomplete -->
            <div *ngIf="!isEdit; else editModeProducto">
              
              <!-- Filter bar – now in TWO ROWS + better spacing -->
              <div *ngIf="!isEdit" class="mb-6 p-5 bg-gray-50 rounded-3xl border border-gray-200">
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-x-4 gap-y-6">
                  
                  <!-- Tipo -->
                  <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Tipo</label>
                    <select [(ngModel)]="selectedTipo" (ngModelChange)="onAnyFilterChange()"
                            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                      <option value="">Todos los tipos</option>
                      <option *ngFor="let tipo of tipos" [value]="tipo.tipo">
                        {{ tipo.tipo }} — {{ tipo.descripcion || 'Sin descripción' }}
                      </option>
                    </select>
                  </div>

                  <!-- Sub Tipo -->
                  <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Sub Tipo</label>
                    <select [(ngModel)]="selectedSubTipo" (ngModelChange)="onAnyFilterChange()"
                            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                      <option value="">Todos los subtipos</option>
                      <option *ngFor="let subTipo of subTipos" [value]="subTipo.subTipo">
                        {{ subTipo.subTipo }} — {{ subTipo.descripcion || 'Sin descripción' }}
                      </option>
                    </select>
                  </div>

                  <!-- Medida -->
                  <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Medida</label>
                    <select [(ngModel)]="selectedMedida" (ngModelChange)="onAnyFilterChange()"
                            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                      <option value="">Todas las medidas</option>
                      <option *ngFor="let medida of medidas" [value]="medida.medida">
                        {{ medida.medida }} — {{ medida.descripcion || 'Sin descripción' }}
                      </option>
                    </select>
                  </div>

                  <!-- Modelo -->
                  <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Modelo</label>
                    <select [(ngModel)]="selectedModelo" (ngModelChange)="onAnyFilterChange()"
                            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                      <option value="">Todos los modelos</option>
                      <option *ngFor="let modelo of modelos" [value]="modelo.modelo">
                        {{ modelo.modelo }} — {{ modelo.descripcion || 'Sin descripción' }}
                      </option>
                    </select>
                  </div>

                  <!-- Color -->
                  <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Color</label>
                    <select [(ngModel)]="selectedColor" (ngModelChange)="onAnyFilterChange()"
                            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                      <option value="">Todos los colores</option>
                      <option *ngFor="let color of colores" [value]="color.color">
                        {{ color.color }} — {{ color.descripcion || 'Sin descripción' }}
                      </option>
                    </select>
                  </div>
                </div>

                <!-- Clear button -->
                <div class="mt-4 flex justify-end">
                  <button type="button" (click)="clearFilters()"
                          class="px-6 py-2 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors flex items-center gap-2">
                    <span>Limpiar filtros</span>
                  </button>
                </div>
              </div>

              <!-- Search input -->
              <input type="text"
                    [(ngModel)]="searchProducto"
                    (ngModelChange)="onSearchChange($event)"
                    name="searchProducto"
                    placeholder="Escribe nombre o ID del producto..."
                    class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">

              <!-- Suggestion dropdown -->
              <div *ngIf="productosFiltrados.length > 0" 
                  class="mt-1 bg-white border border-gray-300 rounded-lg shadow-lg max-h-60 overflow-auto">
                <div *ngFor="let p of productosFiltrados" 
                    (mousedown)="seleccionarProducto(p); $event.preventDefault()"
                    class="px-4 py-3 hover:bg-indigo-50 cursor-pointer border-b border-gray-100 last:border-0 flex justify-between items-center">
                  <div>
                    <span class="font-semibold text-gray-900">{{ p.id }}</span>
                    <span class="ml-3 text-gray-700">{{ p.nombre }}</span>
                  </div>
                  <span class="text-xs text-gray-500">{{ p.tipoProducto }}</span>
                </div>
              </div>

              <!-- Hidden ID -->
              <input type="hidden" [(ngModel)]="formOrdenDetalle.idProducto" name="idProducto" required>
            </div>

            <!-- Modo edición: readonly -->
            <ng-template #editModeProducto>
              <input type="text"
                    [value]="searchProducto || 'Cargando producto...'"
                    disabled
                    class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm bg-gray-50 cursor-not-allowed">
            </ng-template>
          </div>
          <!-- Cantidad -->
          <div>
            <label for="cantidad" class="block text-sm font-medium text-gray-700 mb-2">
              Cantidad <span class="text-red-600">*</span>
            </label>
            <input id="cantidad"
                   type="number"
                   [(ngModel)]="formOrdenDetalle.cantidad"
                   name="cantidad"
                   required
                   min="1"
                   step="1"
                   (ngModelChange)="updateSubtotal()"
                   class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
          </div>

          <!-- Precio Unitario -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Precio Unitario <span class="text-red-600">*</span>
            </label>
            <select [(ngModel)]="formOrdenDetalle.precioUnitario"
                    name="precioUnitario"
                    required
                    (ngModelChange)="updateSubtotal()"
                    class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
              
              <option [ngValue]="null">Selecciona precio...</option>
              
              <option *ngFor="let precio of preciosDisponibles" 
                      [ngValue]="precio.precio">
                {{ precio.precio | number:'1.2-2' }} — {{ precio.descripcion }}
                <span *ngIf="precio.cantidadRequerida > 0" class="text-xs text-amber-600">
                  (mín. {{ precio.cantidadRequerida }})
                </span>
              </option>
            </select>
          </div>

          <!-- Subtotal -->
          <div>
            <label for="subtotal" class="block text-sm font-medium text-gray-700 mb-2">
              Subtotal
            </label>
            <input id="subtotal"
                   type="number"
                   step="0.01"
                   [(ngModel)]="formOrdenDetalle.subtotal"
                   name="subtotal"
                   readonly
                   class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm bg-gray-50">
          </div>
        </div>

        <!-- Botones -->
        <div class="flex justify-end space-x-4 pt-6">
          <button type="button"
                  (click)="goBack()"
                  class="px-8 py-3 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-lg shadow-md transition">
            Cancelar
          </button>
          <button type="submit"
                  [disabled]="detalleForm.invalid"
                  class="inline-flex items-center px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-md transition transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            {{ isEdit ? 'Actualizar' : 'Crear' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
