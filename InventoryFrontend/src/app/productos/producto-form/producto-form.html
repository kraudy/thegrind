<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="bg-white shadow-2xl rounded-2xl p-8 md:p-12">
    <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center">
      {{ isEdit ? 'Editar Producto' : 'Crear Nuevo Producto' }}
    </h2>

    <form (ngSubmit)="onSubmit()" class="space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Nombre -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nombre <span class="text-red-600">*</span></label>
          <input type="text" [(ngModel)]="formProducto.nombre" name="nombre" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition shadow-sm">
        </div>

        <!-- Tipo -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Tipo de Producto <span class="text-red-600">*</span></label>
          <select [(ngModel)]="formProducto.tipoProducto" (change)="onAnyFieldChange()" name="tipoProducto" required
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition shadow-sm">
            <option value="">-- Seleccione un tipo --</option>
            <option *ngFor="let tipo of tipos" [value]="tipo.tipo">
              {{ tipo.tipo }} - {{ tipo.descripcion || 'Sin descripción' }}
            </option>
          </select>
        </div>

        <!-- Sub Tipo -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Sub Tipo de Producto <span class="text-red-600">*</span></label>
          <select [(ngModel)]="formProducto.subTipoProducto" (change)="onAnyFieldChange()" name="subTipoProducto" required
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition shadow-sm">
            <option value="">-- Seleccione un subtipo --</option>
            <option *ngFor="let subTipo of subTipos" [value]="subTipo.subTipo">
              {{ subTipo.subTipo }} - {{ subTipo.descripcion || 'Sin descripción' }}
            </option>
          </select>
        </div>

        <!-- Medida -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Medida de Producto <span class="text-red-600">*</span></label>
          <select [(ngModel)]="formProducto.medidaProducto" (change)="onAnyFieldChange()" name="medidaProducto" required
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition shadow-sm">
            <option value="">-- Seleccione una medida --</option>
            <option *ngFor="let medida of medidas" [value]="medida.medida">
              {{ medida.medida }} - {{ medida.descripcion || 'Sin descripción' }}
            </option>
          </select>
        </div>

        <!-- Modelo -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Modelo de Producto <span class="text-red-600">*</span></label>
          <select [(ngModel)]="formProducto.modeloProducto" (change)="onAnyFieldChange()" name="modeloProducto" required
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition shadow-sm">
            <option value="">-- Seleccione un modelo --</option>
            <option *ngFor="let modelo of modelos" [value]="modelo.modelo">
              {{ modelo.modelo }} - {{ modelo.descripcion || 'Sin descripción' }}
            </option>
          </select>
        </div>

        <!-- Color -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Color <span class="text-red-600">*</span></label>
          <select [(ngModel)]="formProducto.colorProducto" (change)="onAnyFieldChange()" name="colorProducto" required
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition shadow-sm">
            <option value="">-- Seleccione un color --</option>
            <option *ngFor="let color of colores" [value]="color.color">
              {{ color.color }} - {{ color.descripcion || 'Sin descripción' }}
            </option>
          </select>
        </div>

        <!-- Descripción -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
          <textarea [(ngModel)]="formProducto.descripcion" name="descripcion" rows="4"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition shadow-sm resize-none">
          </textarea>
        </div>

        <!-- ==================== IMAGEN ==================== -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Imagen del producto <span class="text-gray-400">(opcional)</span>
          </label>
          
          <!-- Current image (only when editing) -->
          <div *ngIf="isEdit && formProducto.imagen" class="mb-4">
            <p class="text-xs text-gray-500 mb-2">Imagen actual:</p>
            <img [src]="'/images/' + formProducto.imagen" 
                 class="max-w-xs rounded-xl border border-gray-200 shadow-sm"
                 alt="Imagen actual del producto">
          </div>

          <!-- File input -->
          <input type="file" 
                 (change)="onFileSelected($event)"
                 accept="image/jpeg,image/png"
                 class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">

          <!-- Live preview of newly selected image -->
          <div *ngIf="previewUrl" class="mt-4">
            <p class="text-xs text-gray-500 mb-2">Vista previa:</p>
            <img [src]="previewUrl" 
                 class="max-w-xs rounded-xl border border-gray-200 shadow-sm"
                 alt="Vista previa">
          </div>

          <p class="text-xs text-gray-400 mt-2">Solo PNG o JPG • Se guardará como producto-{{ formProducto.id || 'nuevo' }}.jpg/png</p>
        </div>

      </div>

      <div class="flex justify-center space-x-6 pt-6">
        <button type="submit"
                [disabled]="!formProducto.nombre?.trim() || 
                            !formProducto.tipoProducto || 
                            !formProducto.subTipoProducto || 
                            !formProducto.medidaProducto || 
                            !formProducto.modeloProducto ||
                            !formProducto.colorProducto"
                class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-semibold rounded-lg shadow-lg transition transform hover:scale-105">
          {{ isEdit ? 'Actualizar' : 'Crear' }}
        </button>
        <button type="button" (click)="goBack()"
                class="px-8 py-4 bg-gray-500 hover:bg-gray-600 text-white font-semibold rounded-lg shadow-lg transition transform hover:scale-105">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
