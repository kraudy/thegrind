<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="flex justify-between items-center mb-8">
    <a routerLink="/usuarios"
       class="inline-flex items-center px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-lg shadow-md transition">
      ← Volver a Usuarios
    </a>
    <h1 class="text-4xl font-bold text-gray-900">
      {{ isEdit ? 'Editar Usuario' : 'Nuevo Usuario' }}
    </h1>
  </div>

  <div class="bg-white shadow-xl rounded-xl p-10">
    <form (ngSubmit)="onSubmit()">
      <!-- Usuario -->
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-medium mb-2">Usuario</label>
        <input [(ngModel)]="usuario" name="usuario" [readonly]="isEdit"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500"
               placeholder="ejemplo.usuario" required>
      </div>

      <!-- Contraseña (solo creación) -->
      <div class="mb-6" *ngIf="!isEdit">
        <label class="block text-gray-700 text-sm font-medium mb-2">Contraseña</label>
        <input [(ngModel)]="password" name="password" type="password"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500"
               placeholder="••••••••" required>
      </div>

      <!-- Activo -->
      <div class="mb-8 flex items-center">
        <input type="checkbox" [(ngModel)]="activo" name="activo" class="w-5 h-5 text-teal-600">
        <span class="ml-3 text-gray-700 font-medium">Usuario activo</span>
      </div>

      <!-- Roles -->
      <div class="mb-8">
        <label class="block text-gray-700 text-sm font-medium mb-3">Roles</label>
        <div class="grid grid-cols-3 gap-4">
          <label *ngFor="let rol of allRoles" class="flex items-center cursor-pointer bg-gray-50 hover:bg-gray-100 p-3 rounded-xl">
            <input type="checkbox"
                   [checked]="roles.includes(rol)"
                   (change)="toggleRole(rol)"
                   class="w-5 h-5 text-teal-600 mr-3">
            <span class="text-gray-800">{{ rol }}</span>
          </label>
        </div>
      </div>

      <div *ngIf="error" class="text-red-500 text-center mb-6">{{ error }}</div>

      <div class="flex gap-4">
        <button type="submit"
                [disabled]="loading"
                class="flex-1 py-4 bg-teal-600 hover:bg-teal-700 text-white font-semibold text-lg rounded-2xl transition">
          {{ loading ? 'Guardando...' : (isEdit ? 'Guardar Cambios' : 'Crear Usuario') }}
        </button>
        <button type="button" (click)="cancel()"
                class="flex-1 py-4 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold text-lg rounded-2xl transition">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
