<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

  <div class="relative flex justify-between items-center mb-8">
    <a routerLink="/home" class="inline-flex items-center px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-lg shadow-md transition transform hover:scale-105">
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Volver al Inicio
    </a>

    <a routerLink="/usuarios/new" class="inline-flex items-center px-6 py-3 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg shadow-md transition transform hover:scale-105">
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
      Nuevo Usuario
    </a>

    <h1 class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-4xl font-bold text-gray-900 pointer-events-none">
      Usuarios del Sistema
    </h1>
  </div>

  <div *ngIf="loading" class="text-center py-12">Cargando...</div>

  <div class="bg-white shadow-xl rounded-xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Usuario</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Roles</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          
          <!-- ✅ FILA COMPLETA CLICKABLE -->
          <tr *ngFor="let u of usuarios" 
              class="hover:bg-gray-50 transition cursor-pointer"
              (click)="editUsuario(u)">

            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium">{{ u.usuario }}</td>
            
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
              <span [class]="u.activo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'" 
                    class="px-3 py-1 rounded-full text-xs font-medium">
                {{ u.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            
            <td class="px-6 py-4 text-sm text-gray-900">
              <span *ngFor="let rol of u.roles" 
                    class="inline-block bg-violet-100 text-violet-700 text-xs px-3 py-1 rounded-full mr-1 mb-1">
                {{ rol }}
              </span>
            </td>
            
            <!-- ACCIONES -->
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-4">
              <button (click)="toggleActivo(u); $event.stopPropagation()" 
                      class="text-indigo-600 hover:text-indigo-900 font-medium">
                {{ u.activo ? 'Desactivar' : 'Activar' }}
              </button>
              
              <button (click)="resetPassword(u); $event.stopPropagation()" 
                      class="text-amber-600 hover:text-amber-900 font-medium">
                Reset Pass
              </button>
              
              <!-- ✅ Botón Editar eliminado (ya no es necesario) -->
            </td>
          </tr>
        </tbody>
      </table>

      <div *ngIf="usuarios.length === 0" class="text-center py-12">
        <p class="text-gray-500 text-lg">No hay usuarios registrados aún.</p>
      </div>
    </div>
  </div>
</div>
