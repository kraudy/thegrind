<div class="max-w-7xl mx-auto px-4 py-12">
  <div class="flex justify-between items-center mb-6">
    <button (click)="goBack()"
            class="inline-flex items-center px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-xl">
      ← Volver al Calendario
    </button>
    <button (click)="deleteOrderFromCalendar()"
            class="inline-flex items-center px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-medium rounded-xl">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      Eliminar del Calendario
    </button>
  </div>
  <div class="text-center mb-10">
    <h1 class="text-4xl font-bold text-gray-900">Seguimiento Orden #{{ idOrden }}</h1>
    <div class="text-lg text-gray-600 mt-2">{{ clienteNombre }}</div>
  </div>

  <div *ngFor="let det of detalles" class="mb-12 bg-white rounded-3xl shadow-xl overflow-hidden">
    
    <!-- Cabecera -->
    <div class="p-8 border-b bg-gray-50 flex justify-between items-center">
      <div>
        <span class="text-2xl font-bold">#{{ det.idOrdenDetalle }} - {{ det.nombreProducto }} - {{ det.cantidad }} unidades</span>
        <p class="text-gray-500 mt-1">{{ det.tipoProducto }} / {{ det.subTipoProducto }}</p>
      </div>
      <span class="px-5 py-2 bg-indigo-100 text-indigo-700 rounded-2xl text-sm font-medium">
        {{ det.estadoActual || 'Sin estado' }}
      </span>
    </div>

    <!-- STEPPER -->
    <div class="p-8 bg-gray-50">
      <div class="flex items-center justify-between relative mb-8">
        <div *ngFor="let state of getPossibleStates(det.idOrdenDetalle); let i = index" 
             class="flex-1 text-center relative z-10">
          
          <div *ngIf="i < getPossibleStates(det.idOrdenDetalle).length - 1"
               class="absolute top-5 left-1/2 w-full h-0.5 bg-gray-200 -z-10"
               [ngClass]="{'bg-green-500': isReached(det.idOrdenDetalle, getPossibleStates(det.idOrdenDetalle)[i+1])}"></div>

          <div class="mx-auto w-11 h-11 rounded-2xl flex items-center justify-center text-lg font-bold border-4 transition-all"
               [ngClass]="{
                 'bg-green-500 border-green-500 text-white': isReached(det.idOrdenDetalle, state),
                 'bg-indigo-600 border-indigo-600 text-white ring-4 ring-indigo-100': isCurrent(det.idOrdenDetalle, state),
                 'bg-white border-gray-300 text-gray-400': !isReached(det.idOrdenDetalle, state) && !isCurrent(det.idOrdenDetalle, state)
               }">
            {{ i + 1 }}
          </div>

          <div class="mt-3 text-xs font-medium leading-tight"
               [ngClass]="{
                 'text-green-700': isReached(det.idOrdenDetalle, state),
                 'text-indigo-700 font-semibold': isCurrent(det.idOrdenDetalle, state),
                 'text-gray-400': !isReached(det.idOrdenDetalle, state) && !isCurrent(det.idOrdenDetalle, state)
               }">
            {{ state }}
          </div>
        </div>
      </div>

      <!-- Botón Regresar -->
      <div class="flex justify-end">
        <button (click)="reverseDetail(det)"
                [disabled]="isFirstState(det.idOrdenDetalle)"
                class="px-10 py-3 bg-red-600 hover:bg-red-700 disabled:bg-gray-300 text-white font-semibold rounded-2xl flex items-center gap-3 transition">
          Regresar al estado anterior
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
